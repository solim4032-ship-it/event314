<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사랑꾼 테스트</title>

<style>

@font-face {
font-family: 'BMJUA';
src: url('BMJUA.ttf') format('truetype');
font-weight: normal;
font-style: normal;
}
  
*{
cursor:url("cursor.png"), auto;
}
button{
cursor:url("cursor.png"), auto;
}
  
body{
margin:0;
font-family:'BMJUA', sans-serif;
text-align:center;
cursor:url("cursor.png"), auto;
}

/* 질문 페이지 배경 (PC) */

.questionPage{
background:url("question_bg_pc.png") center/cover no-repeat;
min-height:100vh;
}

/* 결과 페이지 배경 (PC) */

.resultPage{
background:url("result_bg_pc.png") center/cover no-repeat;
min-height:100vh;
overflow:hidden;
}

.container{
max-width:700px;
margin:auto;
padding:40px 20px;
}

h1{
font-size:52px;
color:#ff4d88;
text-shadow:0 3px 0 #ffd1e6;
}

.question{
margin:40px 0;
font-size:28px;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

button{
font-family:'BMJUA', sans-serif;
font-size:26px;
width:220px;
padding:12px 25px;
margin:8px;
border:none;
border-radius:30px;
background:#ff9ecb;
cursor:pointer;
}

button:hover{
background:#ff7ab8;
}

button:disabled{
background:#ccc;
cursor:not-allowed;
}
  
#result{
display:none;
font-size:42px;
color:#ff2e63;
margin-top:60px;
}
  
#resultBtn:not(:disabled){
animation: pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}
  
/* 사탕 애니메이션 */

.candy{
position:fixed;
pointer-events:none;
top:-60px;
width:50px;
animation:fall linear forwards;
}

@keyframes fall{

0%{
transform:translateY(-60px) rotate(0deg);
}

100%{
transform:translateY(110vh) rotate(360deg);
}

}

/* ================= */
/* 📱 모바일 전용 디자인 */
/* ================= */

@media (max-width:600px){

.questionPage{
background:url("question_bg_mobile.png") center/cover no-repeat;
}

.resultPage{
background:url("result_bg_mobile.png") center/cover no-repeat;
}

h1{
font-size:36px;
}

.question{
font-size:22px;
}

button{
font-size:22px;
padding:12px 20px;
}

#result{
font-size:32px;
}

.candy{
width:40px;
}

}

</style>
</head>

<body class="questionPage">

<div class="container">

<div id="questionArea">
  
<h1>💗 사랑꾼 테스트 💗</h1>

<div class="question" data-question="1">
Q1. 여자친구가 귀여운가요?<br>
<button onclick="selectAnswer(this)">매우 그렇다</button>
<button onclick="selectAnswer(this)">당연하다</button>
<button onclick="selectAnswer(this)">귀여워서 깨물고 싶다</button>
</div>

<div class="question" data-question="2">
Q2. 여자친구가 달달한걸 좋아하나요?<br>
<button onclick="selectAnswer(this)">좋아한다</button>
<button onclick="selectAnswer(this)">환장하다</button>
<button onclick="selectAnswer(this)">사랑한다</button>
</div>

<div class="question" data-question="3">
Q3. 나는 여자친구를 사랑하나요?<br>
<button onclick="selectAnswer(this)">진짜 사랑한다</button>
<button onclick="selectAnswer(this)">많이 사랑한다</button>
<button onclick="selectAnswer(this)">제일 사랑한다</button>
</div>

<button id="resultBtn" onclick="showResult()" disabled>테스트 결과 보기</button>
</div>

<div id="result">

🍭 테스트 결과 🍭<br><br>

3월 14일 화이트데이에<br>

<b>사탕을 사줘야 합니다 🍬</b><br><br>

이 테스트는 100% 정확합니다.

</div>

</div>

<script>
  
let answered = {
1:false,
2:false,
3:false
}

function selectAnswer(btn){

let question = btn.parentElement
let qNumber = question.dataset.question

let buttons = question.querySelectorAll("button")

buttons.forEach(b=>{
b.style.background="#ff9ecb"
})

btn.style.background="#ff4d88"

answered[qNumber] = true

checkAllAnswered()

}

function checkAllAnswered(){

if(answered[1] && answered[2] && answered[3]){

document.getElementById("resultBtn").disabled=false

}

}
function showResult(){

document.getElementById("questionArea").style.display="none"
document.getElementById("result").style.display="block"

document.body.classList.remove("questionPage")
document.body.classList.add("resultPage")

startCandyRain()

}

/* 사탕 떨어지는 애니메이션 */

function startCandyRain(){

setInterval(()=>{

let candy=document.createElement("img")

candy.src="candy.png"

candy.className="candy"

candy.style.left=Math.random()*window.innerWidth+"px"

candy.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(candy)

setTimeout(()=>{

candy.remove()

},6000)

},400)

}

</script>

</body>
</html>
